schemaVersion: 2.2.0
metadata:
  name: coding-exercises
  description: AI-assisted coding exercises with Continue + NVIDIA Nemotron via MaaS
attributes:
  controller.devfile.io/scc: container-build
components:
  - name: tooling-container
    container:
      image: registry.redhat.io/devspaces/udi-rhel9:3.25.0
      sourceMapping: /projects
      memoryLimit: 4Gi
      memoryRequest: 1Gi
      cpuLimit: "2"
      cpuRequest: 500m
commands:
  - id: copy-continue-config
    exec:
      commandLine: |
        mkdir -p ~/.continue
        cp /projects/coding-exercises/.vscode/config.yaml ~/.continue/config.yaml
        echo "Continue config copied to ~/.continue/config.yaml"
        echo "Edit ~/.continue/config.yaml to set YOUR_MAAS_ROUTE and YOUR_API_KEY"
      component: tooling-container
events:
  postStart:
    - copy-continue-config
