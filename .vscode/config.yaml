name: MaaS Code Assistant
version: 1.0.0
schema: v1
models:
  # Local GPU models (private, on-cluster)
  - name: NVIDIA Nemotron 3 Nano 30B-A3B
    provider: openai
    model: "nemotron-3-nano-30b-a3b"
    apiBase: "YOUR_MAAS_ROUTE/maas/nemotron-3-nano-30b-a3b/v1"
    apiKey: "YOUR_API_KEY"
    contextLength: 131072
    capabilities:
      - tool_use
    defaultCompletionOptions:
      reasoning: true
      maxTokens: 4096

  - name: OpenAI gpt-oss-20b
    provider: openai
    model: "gpt-oss-20b"
    apiBase: "YOUR_MAAS_ROUTE/maas/gpt-oss-20b/v1"
    apiKey: "YOUR_API_KEY"
    contextLength: 8192
    defaultCompletionOptions:
      maxTokens: 4096

  # External OpenAI models (via MaaS Gateway — credential injection handles OpenAI auth)
  - name: OpenAI GPT-4o
    provider: openai
    model: "gpt-4o"
    apiBase: "YOUR_MAAS_ROUTE/maas/gpt-4o/v1"
    apiKey: "YOUR_API_KEY"
    contextLength: 128000
    capabilities:
      - tool_use
    defaultCompletionOptions:
      maxTokens: 4096

  - name: OpenAI GPT-4o Mini
    provider: openai
    model: "gpt-4o-mini"
    apiBase: "YOUR_MAAS_ROUTE/maas/gpt-4o-mini/v1"
    apiKey: "YOUR_API_KEY"
    contextLength: 128000
    capabilities:
      - tool_use
    defaultCompletionOptions:
      maxTokens: 4096

  # GPT-5 Codex — NOT available through MaaS Gateway (payload-processing only supports
  # /chat/completions, but GPT-5 Codex requires /v1/responses). Available via MaaS
  # API key for direct API access. To use in Continue, connect directly to OpenAI:
  #
  # - name: OpenAI GPT-5 Codex (direct)
  #   provider: openai
  #   model: "gpt-5-codex"
  #   apiKey: "YOUR_OPENAI_API_KEY"
  #   contextLength: 128000
  #   capabilities:
  #     - tool_use

context:
  - provider: code
  - provider: docs
  - provider: diff
  - provider: terminal
  - provider: problems
  - provider: folder
  - provider: codebase
